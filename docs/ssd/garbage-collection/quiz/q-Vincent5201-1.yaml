author: Vincent5201
date: 2026-03-07
question: |
  Garbage Collection 章節的大抄提到「追蹤年齡會增加實作複雜度」，在 OS 中常見的 LRU 就是一
  個「需要追蹤年齡資訊」的經典例子，因此以下介紹用於模擬 LRU 且硬體友善的 Second Chance 演
  算法，來幫助了解「追蹤年齡」的議題以及如何應對。
  Second Chance 將所有 Block 組成一個環並各自配置一個 Bit，當 Block 被使用，其 Bit 設為 1。
  要選擇 Victim Block 時，指標檢查當前 Block，若遇到 Bit 為 1，將其清零並移向下一個(循環掃
  描)；若遇到 Bit 為 0，則選該 Block 作為 Victim Block。
  試問若有 4 個 Block，當前指標指向 Block_2(0-index)，各 Block 的 Bit 如下：[0, 0, 1, 1]，
  接下來依序使用了 Block_0、Block_2、Block_1，然後開始找 Victim Block，那會是哪一個 ?
options:
  - text: "Block_0"
    explanation: |
    最終狀態 Block_0 的 Bit 為 0，但不是選到他。
  - text: "Block_1"
    explanation: |
    最終狀態 Block_1 的 Bit 為 0，但不是選到他。
  - text: "Block_2"
    correct: true
    explanation: |
      經過使用後，所有 Block 都被設為 1，接著開始按照環狀循環尋找並把經過的 Block 依序設為 0，
      最後會繞一圈回來選到 Block_2。
  - text: "Block_3"
    explanation: |
    最終狀態 Block_3 的 Bit 為 0，但不是選到他。

